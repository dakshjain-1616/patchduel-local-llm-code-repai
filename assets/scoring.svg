<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 330" width="860" height="330">

  <!-- Background -->
  <rect width="860" height="330" rx="12" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="15" font-weight="700" fill="#24292f">
    Patch Quality Score — 0 to 100
  </text>
  <text x="430" y="48" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">
    Score measures how targeted and correct the generated fix is relative to the buggy source
  </text>

  <!-- Column headers -->
  <text x="50" y="68" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#57606a">Score</text>
  <text x="310" y="68" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#57606a">Patch Type</text>
  <text x="700" y="68" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#57606a">When this score is given</text>

  <line x1="16" y1="74" x2="844" y2="74" stroke="#d0d7de" stroke-width="1"/>

  <!-- Scale: bar area x=90..530 (440px wide), max=100 → 4.4 px/point -->
  <!-- Row height = 40px, 6 rows, start y=80 -->

  <!-- ── Score 100: Exact Match ── -->
  <text x="50" y="106" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="16" font-weight="800" fill="#2da44e">100</text>
  <rect x="90" y="84" width="440" height="28" rx="4" fill="#2da44e"/>
  <text x="90" y="103" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#ffffff" dx="8">Exact match with expected fix</text>
  <text x="545" y="100" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">patch.strip() == expected_fix.strip()</text>

  <!-- ── Score 90: Surgical ── -->
  <text x="50" y="146" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="16" font-weight="800" fill="#4ac26b">90</text>
  <rect x="90" y="124" width="396" height="28" rx="4" fill="#4ac26b"/>
  <text x="90" y="143" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#ffffff" dx="8">Surgical fix</text>
  <text x="545" y="140" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">change_ratio &lt; 5% of file</text>

  <!-- ── Score 80: Moderate ── -->
  <text x="50" y="186" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="16" font-weight="800" fill="#d29922">80</text>
  <rect x="90" y="164" width="352" height="28" rx="4" fill="#d29922"/>
  <text x="90" y="183" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#ffffff" dx="8">Moderate fix</text>
  <text x="545" y="180" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">change_ratio 5–15%</text>

  <!-- ── Score 65: Large ── -->
  <text x="50" y="226" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="16" font-weight="800" fill="#e36209">65</text>
  <rect x="90" y="204" width="286" height="28" rx="4" fill="#e36209"/>
  <text x="90" y="223" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#ffffff" dx="8">Large rewrite</text>
  <text x="545" y="220" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">change_ratio 15–40%</text>

  <!-- ── Score 40: Full rewrite ── -->
  <text x="50" y="266" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="16" font-weight="800" fill="#bc4c00">40</text>
  <rect x="90" y="244" width="176" height="28" rx="4" fill="#bc4c00"/>
  <text x="90" y="263" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" font-weight="600" fill="#ffffff" dx="8">Full rewrite</text>
  <text x="545" y="260" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">change_ratio &gt; 40%</text>

  <!-- ── Score 0: No change ── -->
  <text x="50" y="306" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="16" font-weight="800" fill="#cf222e">0</text>
  <rect x="90" y="284" width="44" height="28" rx="4" fill="#cf222e"/>
  <text x="545" y="300" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#57606a">model returned code unchanged</text>
  <text x="140" y="303" text-anchor="start"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="11" fill="#cf222e">No change made</text>

  <!-- Row separators -->
  <line x1="16" y1="120" x2="844" y2="120" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="16" y1="160" x2="844" y2="160" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="16" y1="200" x2="844" y2="200" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="16" y1="240" x2="844" y2="240" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="16" y1="280" x2="844" y2="280" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Scale x-axis -->
  <line x1="90" y1="74" x2="90" y2="316" stroke="#d0d7de" stroke-width="0.5"/>
  <line x1="530" y1="74" x2="530" y2="316" stroke="#d0d7de" stroke-width="0.5"/>
  <text x="90" y="322" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#8c959f">0</text>
  <text x="530" y="322" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#8c959f">100</text>
  <text x="310" y="322" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="9" fill="#8c959f">score →</text>

  <!-- Bonus note -->
  <text x="430" y="318" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="10" fill="#8c959f" font-style="italic">
    +15 bonus if patch approximates expected fix within 10 chars · capped at 100
  </text>
</svg>
